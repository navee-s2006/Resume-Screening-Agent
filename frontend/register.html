<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Resume Screener</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="login.html" class="logo"><span class="mark">RS</span> Resume Screener</a>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">☾</button>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="eyebrow">Get started</div>
    <h1>Create your account</h1>
    <p class="sub">Upload your resume, see your match score, and know exactly what to learn next.</p>

    <form id="registerForm">
      <div class="field">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" required placeholder="Naveena G">
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required placeholder="naveena_g">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Create account</button>
      <div id="registerError" class="error-text" style="display:none;"></div>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("registerBtn");
    const errEl = document.getElementById("registerError");
    errEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Creating account…";

    const payload = {
      fullName: document.getElementById("fullName").value.trim(),
      username: document.getElementById("username").value.trim(),
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value
    };

    try {
      const res = await fetch(`${API_BASE}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || "Could not create account.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Create account";
        return;
      }

      setCurrentUser(data);
      window.location.href = "home.html";
    } catch (err) {
      errEl.textContent = "Could not reach the server. Is the backend running on port 8080?";
      errEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Create account";
    }
  });
</script>
</body>
</html>
