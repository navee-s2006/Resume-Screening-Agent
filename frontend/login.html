<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Resume Screener</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="login.html" class="logo"><span class="mark">RS</span> Resume Screener</a>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">☾</button>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="eyebrow">Welcome back</div>
    <h1>Log in</h1>
    <p class="sub">Pick up where you left off — check your latest match score or screen a new resume.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Log in</button>
      <div id="loginError" class="error-text" style="display:none;"></div>
    </form>

    <div class="auth-switch">
      New here? <a href="register.html">Create an account</a>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    const errEl = document.getElementById("loginError");
    errEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Logging in…";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || "Login failed. Check your credentials.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Log in";
        return;
      }

      setCurrentUser(data);
      window.location.href = "home.html";
    } catch (err) {
      errEl.textContent = "Could not reach the server. Is the backend running on port 8080?";
      errEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Log in";
    }
  });
</script>
</body>
</html>
