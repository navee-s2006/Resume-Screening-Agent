# ===== SERVER =====
server.port=${PORT:8080}

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:resume_screener}?createDatabaseIfNotExist=true&sslMode=${MYSQL_SSL_MODE:DISABLED}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== File Upload Limits =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Gemini API =====
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
gemini.api.model=${GEMINI_API_MODEL:gemini-1.5-flash}
gemini.use.mock=${GEMINI_USE_MOCK:true}